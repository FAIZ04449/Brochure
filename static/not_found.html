<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Not Found</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1013;
            --panel-dark: #191b20;
            --border-color: #2b2e36;
            --text-primary: #f1f2f4;
            --text-muted: #848995;
            --accent-color: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .not-found-card {
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            background-color: rgba(139, 92, 246, 0.1);
            color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .divider {
            width: 100%;
            height: 1px;
            background-color: var(--border-color);
            margin: 0.5rem 0;
        }

        .contact-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="not-found-card">
        <div class="icon-wrapper">
            <i class="fa-solid fa-link-slash"></i>
        </div>
        <h1>Link Not Found or Expired</h1>
        <p>The document link you followed is no longer active, has expired, or was revoked by the sender.</p>
        <div class="divider"></div>
        <p class="contact-info">If you believe this is in error, please reach out to the sender of the email directly.</p>
    </div>
</body>
</html>
