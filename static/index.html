<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pibit Brochure.pdf</title>
    <!-- PDF.js library from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- Style Sheets -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Embed inline reset overrides to ensure absolutely clean, standard viewer */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1e2023; /* Dark theme standard PDF viewer background */
            overflow: auto;
        }
    </style>
</head>
<body class="dark-theme pdf-native-layout">
    
    <!-- Clean, full-screen container to host rendered PDF pages -->
    <div id="pdf-viewer-container">
        <!-- Rendered page canvases will be appended here dynamically -->
        <div id="loading-indicator">
            <div class="spinner"></div>
            <span>Loading PDF Document...</span>
        </div>
    </div>

    <!-- Script loading and PDF.js execution -->
    <script>
        const pdfUrl = '/static/pibit Brochure.pdf';

        // Set worker source
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;
        const container = document.getElementById('pdf-viewer-container');
        const loadingIndicator = document.getElementById('loading-indicator');

        // Load the PDF document
        pdfjsLib.getDocument(pdfUrl).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            
            // Hide loading indicator
            if (loadingIndicator) {
                loadingIndicator.style.display = 'none';
            }

            // Create page wrappers synchronously so they exist in DOM instantly
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const pageWrapper = document.createElement('div');
                pageWrapper.className = 'pdf-page-wrapper';
                pageWrapper.id = `page-${i}`;
                pageWrapper.setAttribute('data-page-name', `Page ${i}`);
                
                const canvas = document.createElement('canvas');
                pageWrapper.appendChild(canvas);
                container.appendChild(pageWrapper);
            }

            // Render all pages in sequence
            renderAllPages().then(() => {
                // Initialize tracker after all pages are rendered and visible in DOM
                if (window.initializeTracker) {
                    window.initializeTracker();
                }
            });
        }).catch(err => {
            console.error('Error loading PDF document:', err);
            if (loadingIndicator) {
                loadingIndicator.innerHTML = '<span style="color: #ef4444;">Failed to load PDF document. Please refresh.</span>';
            }
        });

        async function renderAllPages() {
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const canvas = document.querySelector(`#page-${i} canvas`);
                if (canvas) {
                    await renderPage(i, canvas);
                }
            }
        }

        function renderPage(num, canvas) {
            return new Promise((resolve, reject) => {
                pdfDoc.getPage(num).then(page => {
                    const ctx = canvas.getContext('2d');
                    
                    // Determine viewport scale based on window width
                    const viewportWidth = window.innerWidth;
                    const defaultViewport = page.getViewport({ scale: 1.0 });
                    
                    // Standard centered width (max width 850px for standard reading size)
                    const targetWidth = Math.min(850, viewportWidth * 0.96);
                    const scale = targetWidth / defaultViewport.width;

                    const viewport = page.getViewport({ scale: scale });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };
                    
                    page.render(renderContext).promise.then(() => {
                        resolve();
                    }).catch(reject);
                }).catch(reject);
            });
        }
    </script>
    <script src="/static/js/tracker.js"></script>
</body>
</html>
